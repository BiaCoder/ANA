<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Gerenciador de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Minhas Tarefas</h1>

        <div class="entrada-tarefa">
            <input type="text" id="campo-tarefa" placeholder="O que você precisa fazer?">

    <textarea id="input-detalhes" placeholder="Adicione os detalhes ou observações da tarefa..."></textarea>

    <div class="campos-extras">
        <select id="select-categoria">
            <option value="Estudos">📚 Estudos</option>
            <option value="Trabalho">💼 Trabalho</option>
            <option value="Projetos">🎨 Projetos / Pessoal</option>
            <option value="Finanças">💸 Finanças</option>
            <option value="Outros">⚙️ Outros</option>
        </select>

        <input type="date" id="input-data">
    </div>

    <button id="botao-add-avancado">Adicionar na Agenda</button>
</div>

        <ul id="lista-tarefas">
            </ul>
    </div>
<script src="script.js"></script>
</body>
</html>
